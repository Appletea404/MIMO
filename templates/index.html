<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 피부 메이크업 추천</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">● 어떤 피부 고민이 있으신가요?</h1>

    <div class="filter-row">
      <select id="gender">
        <option value="성별 선택">성별 선택</option>
        <option value="여성">여성</option>
        <option value="남성">남성</option>
      </select>
      <select id="age">
        <option value="연령대 선택">연령대 선택</option>
        <option value="20대">20대</option>
        <option value="30대">30대</option>
        <option value="40대">40대</option>
        <option value="50대 이상">50대 이상</option>
      </select>
      <select id="skin_type">
        <option value="피부 타입 선택">피부 타입 선택</option>
        <option value="건성">건성</option>
        <option value="지성">지성</option>
        <option value="복합성">복합성</option>
        <option value="정상">정상</option>
      </select>
    </div>

    <div class="input-row">
      <input type="text" id="keyword" placeholder="피부 고민을 입력하세요 (예: 여드름 자극 줄이는 법)">
      <button id="btn-recommend" onclick="getRecommendation()">추천 받기</button>
    </div>

    <div id="result-box" class="result-box hidden">
      <p id="profile-text" class="profile"></p>
      <p class="section-title">[추천 솔루션]</p>
      <p id="response-text" class="response"></p>
      <hr>
      <p id="rec-text" class="ingredients rec"></p>
      <p id="avoid-text" class="ingredients avoid"></p>
    </div>

    <div id="error-box" class="error-box hidden">
      <p id="error-text"></p>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>분석 중...</span>
    </div>
  </div>

  <script>
    document.getElementById('keyword').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') getRecommendation();
    });

    async function getRecommendation() {
      const keyword   = document.getElementById('keyword').value.trim();
      const gender    = document.getElementById('gender').value;
      const age       = document.getElementById('age').value;
      const skin_type = document.getElementById('skin_type').value;

      const noKeyword  = !keyword;
      const noProfile  = gender === '성별 선택' && age === '연령대 선택' && skin_type === '피부 타입 선택';
      if (noKeyword && noProfile) {
        showError('피부 고민을 입력하거나 조건을 선택해주세요.');
        return;
      }

      showLoading(true);
      hideResult();
      hideError();

      try {
        const res = await fetch('/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, gender, age, skin_type })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || '오류가 발생했습니다.');
          return;
        }

        document.getElementById('profile-text').textContent  = '프로필: ' + data.profile;
        document.getElementById('response-text').textContent = data.response;
        document.getElementById('rec-text').textContent      = '✨ 추천 성분: ' + data.rec_ingredients;
        document.getElementById('avoid-text').textContent    = '⚠️ 주의 성분: ' + data.avoid_ingredients;
        document.getElementById('result-box').classList.remove('hidden');

      } catch (err) {
        showError('서버 연결에 실패했습니다.');
      } finally {
        showLoading(false);
      }
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
    }
    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-box').classList.remove('hidden');
    }
    function hideResult() {
      document.getElementById('result-box').classList.add('hidden');
    }
    function hideError() {
      document.getElementById('error-box').classList.add('hidden');
    }
  </script>
</body>
</html>
